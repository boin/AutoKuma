name: Deploy Documentation

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Zensical and mike
        run: pip install zensical git+https://github.com/squidfunk/mike.git

      - name: Setup SSH deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DOCS_KEY }}

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote add docs git@github.com:BigBoot/AutoKuma-docs.git
          git fetch docs gh-pages:gh-pages || true

      - name: Deploy dev (master branch)
        if: github.ref == 'refs/heads/master'
        run: |
          mike deploy --push --remote docs --config-file zensical.toml dev
          # Use latest as default if it already exists, otherwise fall back to dev
          if mike list --remote docs 2>/dev/null | grep -q "latest"; then
            mike set-default --push --remote docs latest
          else
            mike set-default --push --remote docs dev
          fi

      - name: Deploy tagged version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            sed -i "s/^autokuma_latest_release = .*/autokuma_latest_release = \"$VERSION\"/" zensical.toml
            mike deploy --push --update-aliases --remote docs --config-file zensical.toml "$VERSION" latest stable
            mike set-default --push --remote docs latest
          else
            mike deploy --push --remote docs --config-file zensical.toml "$VERSION"
          fi
